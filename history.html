<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบออกใบสั่งขาย - ประวัติการขาย</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    .nav-bar { display:flex; gap:8px; padding:12px 24px; background:#f1f5f9; border-bottom:1px solid #e2e8f0; flex-wrap:wrap; }
    .nav-bar a { padding:8px 16px; border-radius:8px; text-decoration:none; font-weight:600; font-size:13px; color:#64748b; transition:all .2s; cursor:pointer; }
    .nav-bar a:hover { background:#dbeafe; color:#2563eb; }
    .nav-bar a.active { background:#2563eb; color:#fff; }
    
    .data-table { width:100%; border-collapse:separate; border-spacing:0; font-size:13px; }
    .data-table thead th { background:linear-gradient(135deg,#2563eb,#1d4ed8); color:#fff; padding:12px; text-align:left; font-weight:600; font-size:12px; position:sticky; top:0; }
    .data-table thead th:first-child { border-radius:8px 0 0 0; }
    .data-table thead th:last-child { border-radius:0 8px 0 0; }
    .data-table tbody td { padding:10px 12px; border-bottom:1px solid #e2e8f0; vertical-align:middle; }
    .data-table tbody tr:hover { background:#f8fafc; }
    
    .btn-print { padding:6px 12px; border:1.5px solid #10b981; background:#ecfdf5; color:#10b981; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; transition:all .2s; font-family:'Sarabun',sans-serif; }
    .btn-print:hover { background:#10b981; color:#fff; }
    
    .search-box { margin-bottom: 20px; position: relative; }
    .search-box input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 14px; outline: none; transition: all .2s; }
    .search-box input:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }

    .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .status-paid { background: #dcfce7; color: #15803d; }

    @media (max-width:768px) {
      .data-table { font-size:12px; }
      .data-table thead th, .data-table tbody td { padding:8px 6px; }
      .table-wrapper { overflow-x:auto; margin:0 -16px; padding:0 16px; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="loading-text" id="loadingText">กำลังโหลดข้อมูล...</div>
  </div>
</div>

<header class="app-header">
  <div class="logo">📑</div>
  <div>
    <h1>ประวัติการขาย (SO History)</h1>
    <p>ดูประวัติ ค้นหา และพิมพ์ใบสั่งขายย้อนหลัง</p>
  </div>
</header>

<nav class="nav-bar">
  <a onclick="goPage('index')">📋 สร้าง Sale Order</a>
  <a class="active">📑 ประวัติการขาย</a>
  <a onclick="goPage('salesperson')">👥 พนักงานขาย</a>
  <a onclick="goPage('product')">📦 สินค้า</a>
</nav>

<div class="container">
  <div class="card">
    <div class="card-header">
      <div class="icon green">🔍</div>
      <h2>รายการใบสั่งขายทั้งหมด</h2>
    </div>
    <div class="card-body">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="ค้นหาด้วยเลขที่ SO หรือ ชื่อลูกค้า..." oninput="filterOrders()">
      </div>

      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>วันที่</th>
              <th>เลขที่ SO</th>
              <th>ชื่อลูกค้า</th>
              <th>พนักงานขาย</th>
              <th style="text-align:right;">ยอดรวมสุทธิ</th>
              <th style="text-align:center;">จัดการ</th>
            </tr>
          </thead>
          <tbody id="orderTableBody">
            <!-- Dynamic -->
          </tbody>
        </table>
      </div>

      <div id="pagination" class="pagination"></div>
    </div>
  </div>
</div>

<script src="./js/api.js"></script>
<script>
  let allOrders = [];
  let currentPage = 1;
  const itemsPerPage = 10;

  function formatDate(val) {
    if (!val) return '-';
    if (typeof val === 'string' && val.indexOf('T') !== -1 && val.indexOf('Z') !== -1) {
      try {
        const d = new Date(val);
        const dd = ("0" + d.getDate()).slice(-2);
        const mm = ("0" + (d.getMonth() + 1)).slice(-2);
        const fullYear = d.getFullYear();
        const beYear = fullYear < 2400 ? fullYear + 543 : fullYear;
        return `${dd}/${mm}/${beYear}`;
      } catch(e) { return val; }
    }
    return val;
  }

  async function loadOrders() {
    showLoading();
    try {
      const result = await API.getSaleOrders();
      if (result.success) {
        allOrders = result.data || [];
        renderTable();
      }
    } catch (e) {
      console.error(e);
    } finally {
      hideLoading();
    }
  }

  function renderTable() {
    const input = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allOrders.filter(o => 
      o.SO_Number.toLowerCase().includes(input) || 
      (o.Customer_Name || '').toLowerCase().includes(input)
    );

    const totalPages = Math.ceil(filtered.length / itemsPerPage);
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const paginated = filtered.slice(start, end);

    const tbody = document.getElementById('orderTableBody');
    tbody.innerHTML = '';

    if (paginated.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px; color:#64748b;">ไม่พบข้อมูลการขาย</td></tr>';
      return;
    }

    paginated.forEach(o => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${formatDate(o.SO_Date)}</td>
        <td style="font-weight:700; color:#2563eb;">${o.SO_Number}</td>
        <td>${o.Customer_Name || '-'}</td>
        <td>${o.Sales_Name || o.Sales_ID || '-'}</td>
        <td style="text-align:right; font-weight:700;">${parseFloat(o.Grand_Total || 0).toLocaleString()}</td>
        <td style="text-align:center;">
          <button class="btn-print" onclick="printOrder('${o.SO_Number}')">🖨️ พิมพ์</button>
        </td>
      `;
      tbody.appendChild(tr);
    });

    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    const container = document.getElementById('pagination');
    container.innerHTML = '';
    if (totalPages <= 1) return;

    for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = i === currentPage ? 'active' : '';
        btn.onclick = () => { currentPage = i; renderTable(); };
        container.appendChild(btn);
    }
  }

  function filterOrders() {
    currentPage = 1;
    renderTable();
  }

  function printOrder(so) {
    if(typeof fetchAPI !== "undefined") {
      fetchAPI("logAction", { actionName: "พิมพ์เอกสารย้อนหลัง", details: "เลขที่ SO: " + so }).catch(e=>console.log(e));
    }
    window.open('print-template.html?so=' + so, '_blank');
  }

  function goPage(page) {
    if (page === 'index') window.location.href = 'index.html';
    if (page === 'salesperson') window.location.href = 'master-salesperson.html';
    if (page === 'product') window.location.href = 'master-product.html';
  }

  function showLoading() { document.getElementById('loadingOverlay').classList.add('show'); }
  function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

  window.onload = loadOrders;
</script>
<script src="./js/auth.js"></script>
<footer style="text-align:center; padding: 20px; color: var(--text-muted); font-size: 12px;">
  System Version V1.0.1
</footer>
</body>
</html>
